<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A3B32"/>
      <stop offset="100%" stop-color="#2A1910"/>
    </linearGradient>
    <linearGradient id="symbolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B896"/>
      <stop offset="100%" stop-color="#B8926A"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8926A" stop-opacity="0"/>
      <stop offset="30%" stop-color="#D4B896"/>
      <stop offset="70%" stop-color="#D4B896"/>
      <stop offset="100%" stop-color="#B8926A" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="36" fill="url(#bgGrad)"/>

  <!-- Inner border ring -->
  <rect x="6" y="6" width="188" height="188" rx="31" fill="none"
        stroke="#B8926A" stroke-width="1" opacity="0.25"/>

  <!-- Infinity symbol – two-loop lemniscate via bezier curves -->
  <!-- Right lobe: center → right → center (top arc) -->
  <!-- Left lobe: center → left → center -->
  <path d="
    M 100 92
    C 108 66, 155 62, 162 84
    C 169 106, 145 128, 122 116
    C 111 110, 103 100, 100 92
    C 97 84, 89 74, 78 68
    C 55 56, 31 78, 38 100
    C 45 122, 78 130, 100 108
    C 111 100, 114 96, 100 92 Z
  " fill="url(#symbolGrad)" opacity="0.15"/>

  <!-- Infinity stroke (the actual visible lines) -->
  <path d="
    M 100 100
    C 106 72, 150 62, 163 86
    C 171 105, 152 130, 128 120
    C 113 113, 104 100, 100 100
    C 96 100, 87 87, 72 80
    C 48 70, 29 95, 37 114
    C 45 133, 78 132, 100 100 Z
  " fill="none" stroke="url(#symbolGrad)" stroke-width="9"
    stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Subtle accent lines at top/bottom of symbol -->
  <line x1="52" y1="138" x2="148" y2="138"
        stroke="url(#accentBar)" stroke-width="1.5" opacity="0.6"/>

  <!-- "INFINITY" text -->
  <text x="100" y="168"
        text-anchor="middle"
        font-family="Georgia, 'Palatino Linotype', serif"
        font-size="18"
        font-weight="700"
        letter-spacing="5"
        fill="#D4B896"
        opacity="0.95">INFINITY</text>

  <!-- Tagline dot accents -->
  <circle cx="36" cy="163" r="2" fill="#B8926A" opacity="0.5"/>
  <circle cx="164" cy="163" r="2" fill="#B8926A" opacity="0.5"/>
</svg>
